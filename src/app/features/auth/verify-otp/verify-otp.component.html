<section class="auth-page">
  <div class="auth-bg-pattern"></div>

  <div class="auth-container">
   

    <div class="auth-card">
      <div class="auth-card-header">
        <div class="back-link">
          <a routerLink="/auth/login" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            {{ 'VERIFY_OTP.BACK' | translate }}
          </a>
        </div>
        <h2>{{ 'VERIFY_OTP.VERIFY_TITLE' | translate }}</h2>
        <p>{{ 'VERIFY_OTP.VERIFY_DESC' | translate }}</p>
        <p class="contact-info">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            @if (method === 'email') {
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            } @else {
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
            }
          </svg>
          <span>{{ contactDisplay }}</span>
        </p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <div class="input-group">
          <label for="otp" class="input-label">{{ 'VERIFY_OTP.OTP_LABEL' | translate }}</label>
          <div class="otp-input-wrapper">
            <input
              id="otp"
              type="text"
              formControlName="otp"
              class="cinema-input otp-input"
              [class.error]="form.controls.otp.invalid && form.controls.otp.touched"
              placeholder="{{ 'VERIFY_OTP.OTP_PLACEHOLDER' | translate }}"
              maxlength="4"
              inputmode="numeric"
              pattern="[0-9]*"
            />
          </div>
          @if (form.controls.otp.invalid && form.controls.otp.touched) {
            <span class="input-error">{{ 'VERIFY_OTP.OTP_ERROR' | translate }}</span>
          }
        </div>

        <button type="submit" class="btn-primary auth-submit" [disabled]="isLoading()">
          @if (isLoading()) {
            <app-loading-spinner></app-loading-spinner>
            <span>{{ 'VERIFY_OTP.VERIFYING' | translate }}</span>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            <span>{{ 'VERIFY_OTP.VERIFY_CONTINUE' | translate }}</span>
          }
        </button>
      </form>

      <div class="auth-footer">
        <p>{{ 'VERIFY_OTP.RESEND' | translate }}</p>
      </div>
    </div>
  </div>
</section>
