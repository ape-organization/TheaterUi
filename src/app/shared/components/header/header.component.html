      <!-- Language Toggle -->
      <div class="lang-toggle">
        <button
          type="button"
          class="lang-btn"
          [class.active]="currentLang() === 'en'"
          (click)="switchLanguage('en')">{{ 'LANG.EN' | translate }}</button>
        <button
          type="button"
